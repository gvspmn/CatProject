name: Security CI/CD Pipeline

on:
  pull_request:
    branches:
      - master

permissions:
  issues: write
  contents: read

jobs:
  sast_scan:
    name: Semgrep SAST Scan
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/security-audit
            p/owasp-top-ten

  dast_scan:
    name: OWASP ZAP DAST Scan
    runs-on: self-hosted
    needs: sast_scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start the Application using Docker Compose
        run: |
          docker compose build
          docker compose up -d
          echo "Чекаємо 15 секунд, щоб база даних та сервер повністю запустилися..."
          sleep 15

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost'
          fail_action: false
          artifact_name: 'zap-reports'
