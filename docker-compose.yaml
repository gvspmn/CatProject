version: '3.3'

services:
  # 1. Reverse Proxy (Nginx) - точка входу в нашу інфраструктуру
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - app-network

  # 2. Твій веб-застосунок (Node.js)
  web:
    build: .
    expose:
      - "3000" # Змінили з ports на expose, щоб доступ був лише через Nginx
    environment:
      - DB_USER=${DB_USER}
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
    depends_on:
      - db
    networks:
      - app-network

  # 3. База даних (PostgreSQL)
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  # 4. Система моніторингу (Prometheus) - вимога курсової
  prometheus:
    image: prom/prometheus:latest
    container_name: catproject_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app-network

  # 5. Візуалізація моніторингу (Grafana) - вимога курсової
  grafana:
    image: grafana/grafana:latest
    container_name: catproject_grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin # Твій постійний пароль
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: catproject_node_exporter
    ports:
      - "9100:9100"
    networks:
      - app-network

  locust:
    image: locustio/locust
    container_name: catproject_locust
    ports:
      - "8089:8089"
    volumes:
      - ./:/mnt/locust
    command: -f /mnt/locust/locustfile.py
    networks:
      - app-network

  loki:
    image: grafana/loki:latest
    container_name: catproject_loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network

  promtail:
    image: grafana/promtail:latest
    container_name: catproject_promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - app-network

volumes:
  pgdata:
  grafana_data:
  loki_data:

networks:
  app-network:
    driver: bridge
